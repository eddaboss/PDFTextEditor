name: CI

# Build gate: every PR (and pushes to master/dev) must build green on BOTH
# macOS and Windows from the one shared codebase before it can merge.
on:
  pull_request:
  push:
    branches: [master, dev]

jobs:
  pii-scan:
    name: PII / secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Test the scanner
        run: python tests/test_pii_guard.py
      - name: Scan for PII and secrets
        run: python scripts/pii_guard.py --all

  build:
    name: Build & test (${{ matrix.os }})
    # Gate the expensive macOS+Windows matrix on the cheap scan so a PII finding
    # never burns build minutes.
    needs: pii-scan
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Tests exercise the OCR module, so install the OCR pack deps too.
          pip install -r requirements.txt -r requirements-ocr.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python build_icon.py

      - name: Run headless test suites
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python tests/test_app.py
          python tests/test_font_fidelity.py
          python tests/test_ocr_sizing.py
          python tests/test_ocr_overlay.py
          python tests/test_degrade.py
          python tests/test_ocr_blend.py
          python tests/test_page_layout.py
          python tests/test_fontbank.py

      - name: Build app (PyInstaller)
        run: pyinstaller --noconfirm "PDFTextEditor.spec"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFTextEditor-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
