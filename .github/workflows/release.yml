name: Release

# Each platform builds, packages an installer, signs a new tufup bundle, and
# merges it onto its channel volume. A push to master publishes to the STABLE
# channel; a push to dev publishes to the DEV channel (CHANNEL is derived from
# the ref below).
#
# A release fires ONLY when the version file changes, so day-to-day pushes to dev
# do not cut a build (test those with a local ./build_app.sh; the backend
# redeploys on every push regardless). To publish an update, bump
# pdftexteditor/__version__ -- the build always packages whatever code is on the
# branch at that point.
on:
  push:
    branches: [master, dev]
    paths:
      - 'pdftexteditor/__init__.py'
  workflow_dispatch:

jobs:
  reset:
    # One-shot volume clean. When a release commit message contains
    # [reset-updates], wipe this channel's update tree + installers FIRST, so the
    # build below republishes a single clean baseline (drops accumulated/broken
    # archives). A normal release skips this step entirely.
    runs-on: ubuntu-latest
    steps:
      - name: Wipe update volume
        if: contains(github.event.head_commit.message, '[reset-updates]')
        env:
          API: ${{ github.ref == 'refs/heads/master' && secrets.API_URL_PROD || secrets.API_URL_DEV }}
          TOKEN: ${{ github.ref == 'refs/heads/master' && secrets.PUBLISH_TOKEN_PROD || secrets.PUBLISH_TOKEN_DEV }}
        run: |
          echo "Wiping update volume for a clean baseline..."
          curl -fsS -X POST "$API/api/admin/wipe-updates" \
            -H "Authorization: Bearer $TOKEN"
          echo

  release:
    needs: [reset]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    env:
      CHANNEL: ${{ github.ref == 'refs/heads/master' && 'stable' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # NON-BREAKING for now: the OCR pack deps are still installed, so OCR
          # stays bundled and working. To SLIM the installer, drop
          # `-r requirements-ocr.txt` here and add the pack build+upload step
          # (build the per-platform pack, host it gate-exempt so pack.py can
          # fetch it). See requirements-ocr.txt + pdftexteditor/ocr/pack.py.
          pip install -r requirements.txt -r requirements-ocr.txt
          pip install pyinstaller pillow requests tufup

      - name: Build app
        env:
          PDFTE_BUILD_CHANNEL: ${{ env.CHANNEL }}
        run: |
          python build_icon.py
          pyinstaller --noconfirm "PDFTextEditor.spec"

      - name: Package installer (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(ls -d dist/*.app)
          VER=$(python -c "import pdftexteditor; print(pdftexteditor.__version__)")
          NAME=$(basename "$APP" .app)
          DMG="dist/${NAME// /}-${VER}.dmg"
          bash release/make_dmg.sh "$APP" "$DMG" "$NAME"
          echo "APP_DIR=$APP" >> "$GITHUB_ENV"
          echo "INSTALLER=$DMG" >> "$GITHUB_ENV"

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'win'
        run: choco install innosetup -y --no-progress

      - name: Package installer (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          PDFTE_BUNDLE_ID: ${{ env.CHANNEL == 'stable' && 'com.eddaboss.pdftexteditor' || 'com.eddaboss.pdftexteditor.dev' }}
        run: |
          APPDIR=$(ls -d dist/*/ | head -1)
          NAME=$(basename "$APPDIR")
          VER=$(python -c "import pdftexteditor; print(pdftexteditor.__version__)")
          OUT="${NAME// /}-${VER}-setup"
          PDFTE_APP_NAME="$NAME" PDFTE_APP_VERSION="$VER" \
            PDFTE_SRC_DIR="$(cygpath -w "$PWD/${APPDIR%/}")" \
            PDFTE_OUT_NAME="$OUT" \
            "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" release/windows_installer.iss
          echo "APP_DIR=$APPDIR" >> "$GITHUB_ENV"
          echo "INSTALLER=release/$OUT.exe" >> "$GITHUB_ENV"

      - name: Publish to channel
        shell: bash
        env:
          PDFTE_TUFUP_KEYS: ${{ secrets.PDFTE_TUFUP_KEYS }}
        run: |
          if [ "${CHANNEL}" = "stable" ]; then
            API="${{ secrets.API_URL_PROD }}"; TOK="${{ secrets.PUBLISH_TOKEN_PROD }}"
          else
            API="${{ secrets.API_URL_DEV }}"; TOK="${{ secrets.PUBLISH_TOKEN_DEV }}"
          fi
          python release/publish_release.py "$API" "$TOK" "${{ matrix.platform }}" "$APP_DIR" "$INSTALLER"
